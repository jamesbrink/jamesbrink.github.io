name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Nightly rebuild at 6 AM UTC to refresh GitHub star counts
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # IndexNow: tell Bing (feeds ChatGPT Search) about all URLs after deploy.
      # The key is public by design — the key file on the site proves ownership.
      - name: Notify IndexNow
        continue-on-error: true
        env:
          INDEXNOW_KEY: 85326bd86af44e9189ca1b82af5ba229
        run: |
          urls=$(curl -sf https://jamesbrink.online/sitemap-0.xml \
            | grep -o '<loc>[^<]*</loc>' | sed 's/<[^>]*>//g' | jq -R . | jq -s .)
          curl -sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"jamesbrink.online\",\"key\":\"$INDEXNOW_KEY\",\"keyLocation\":\"https://jamesbrink.online/$INDEXNOW_KEY.txt\",\"urlList\":$urls}"
